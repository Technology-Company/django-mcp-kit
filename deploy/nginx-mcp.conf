# Sample nginx location for proxying /mcp to the MCP ASGI process.
# Streamable HTTP uses SSE, so buffering must be OFF and read timeouts long.
# Add inside your existing server { } block.

location /mcp {
    proxy_pass http://127.0.0.1:8810;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # SSE / long-lived streams: disable buffering, allow long reads.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
}

# RFC 9728 protected-resource metadata (served by the MCP app or your Django site).
location = /.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:8810;
    proxy_set_header Host $host;
}
